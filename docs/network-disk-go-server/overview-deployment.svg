<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1380" viewBox="0 0 2200 1380">
  <defs>
    <style>
      text {
        font-family: "Segoe UI", Arial, sans-serif;
        fill: #111827;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
      }
      .label {
        font-size: 17px;
        font-weight: 600;
      }
      .small {
        font-size: 14px;
        font-weight: 600;
      }
      .tiny {
        font-size: 13px;
        font-weight: 600;
      }
      .accent {
        font-size: 15px;
        font-weight: 700;
        fill: #14b8a6;
      }
      .accent-route {
        font-size: 15px;
        font-weight: 700;
        fill: #8b5cf6;
      }
      .muted {
        font-size: 14px;
        font-weight: 600;
        fill: #475569;
      }
      .client-frame {
        fill: #fff7ed;
        stroke: #f97316;
        stroke-width: 3;
        rx: 18;
      }
      .server-frame {
        fill: #eff6ff;
        stroke: #60a5fa;
        stroke-width: 3;
        rx: 18;
      }
      .remote-frame {
        fill: #f5f3ff;
        stroke: #8b5cf6;
        stroke-width: 3;
        rx: 18;
      }
      .gateway {
        fill: #dbeafe;
        stroke: #2563eb;
        stroke-width: 2.5;
        rx: 12;
      }
      .session {
        fill: #ffedd5;
        stroke: #ea580c;
        stroke-width: 2;
        rx: 12;
      }
      .media {
        fill: #fff7ed;
        stroke: #f97316;
        stroke-width: 2;
        rx: 12;
      }
      .runtime {
        fill: #ffffff;
        stroke: #f97316;
        stroke-width: 2.5;
        rx: 14;
      }
      .catalog {
        fill: #fffaf2;
        stroke: #fb923c;
        stroke-width: 2;
        rx: 16;
      }
      .group {
        fill: #f8fafc;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        rx: 14;
      }
      .storer {
        fill: #ffffff;
        stroke: #60a5fa;
        stroke-width: 2;
        rx: 10;
      }
      .route {
        fill: #ffffff;
        stroke: #8b5cf6;
        stroke-width: 2;
        rx: 10;
      }
      .solid {
        stroke: #475569;
        stroke-width: 2.5;
        fill: none;
      }
      .dashed {
        stroke: #0f766e;
        stroke-width: 3;
        fill: none;
        stroke-dasharray: 10 8;
      }
      .routed {
        stroke: #7c3aed;
        stroke-width: 2.5;
        fill: none;
        stroke-dasharray: 8 8;
      }
      .bind {
        stroke: #475569;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 6 6;
      }
    </style>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
